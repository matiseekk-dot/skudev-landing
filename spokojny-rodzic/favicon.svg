<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="112" fill="#FBF7EF"/>
  
  <!-- Round baby head -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#1E2618" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Coral cheek blush (BEHIND face features for layering) -->
  <circle cx="182" cy="278" r="16" fill="#C95A48" opacity="0.75"/>
  <circle cx="330" cy="278" r="16" fill="#C95A48" opacity="0.75"/>
  
  <!-- Closed eyes (sleeping curves) -->
  <path d="M 198 235 Q 215 250 232 235" fill="none" stroke="#1E2618" stroke-width="12" stroke-linecap="round"/>
  <path d="M 280 235 Q 297 250 314 235" fill="none" stroke="#1E2618" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Gentle smile -->
  <path d="M 222 295 Q 256 318 290 295" fill="none" stroke="#1E2618" stroke-width="12" stroke-linecap="round"/>
</svg>
